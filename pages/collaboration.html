    <style>
        .collab-wrapper {
            margin-top: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .role-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-btn.active.creator {
            background: #8ec5fc;
            color: #fff;
            border-color: #8ec5fc;
        }

        .role-btn.inactive.creator {
            background: #fff;
            color: #8ec5fc;
            border-color: #8ec5fc;
        }

        .role-btn.active.brand {
            background: #e0c3fc;
            color: #fff;
            border-color: #e0c3fc;
        }

        .role-btn.inactive.brand {
            background: #fff;
            color: #e0c3fc;
            border-color: #e0c3fc;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-family: inherit;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #8ec5fc;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(142, 197, 252, 0.4);
        }

        #form-message {
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
        }
        
        .success-msg { background: #d4edda; color: #155724; }
        .error-msg { background: #f8d7da; color: #721c24; }
    </style>
</head>

        <section>
            <a href="../index.html" class="back-btn">← Back to Home</a>
            
            <div class="collab-wrapper">
                <h2>🤝 Let's Collaborate</h2>
                <p style="margin-bottom: 25px; color: #555;">Choose how you want to connect with me.</p>

                <div class="role-tabs">
                    <button id="btn-creator" class="role-btn active creator" onclick="selectRole('Creator')">I am a Creator</button>
                    <button id="btn-brand" class="role-btn inactive brand" onclick="selectRole('Brand')">I am a Brand</button>
                </div>

                <form id="collab-form">
                    <input type="hidden" id="role" name="role" value="Creator">
                    
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="name" name="name" required placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" id="number" name="number" required placeholder="Enter your mobile number">
                    </div>

                    <!-- Creator Only -->
                    <div class="form-group" id="creator-fields">
                        <label>Social Media Handle</label>
                        <input type="text" id="social" name="social" placeholder="e.g., @yourhandle">
                    </div>

                    <!-- Brand Only -->
                    <div class="form-group" id="brand-fields" style="display: none;">
                        <label>Product Details</label>
                        <textarea id="productDetails" name="productDetails" rows="4" placeholder="Tell me about your product..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Other Information</label>
                        <textarea id="otherInfo" name="otherInfo" rows="4" placeholder="Any additional details..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">Submit Details</button>
                    <div id="form-message" style="display: none;"></div>
                </form>
            </div>
        </section>

        <footer>
            <p>© 2024 Spirogyraplan - Swapnil Baranwal | Made with ❤️ and 🌈</p>
        </footer>

    <!-- Script to Handle Form Logic -->
    <script>
        function selectRole(role) {
            document.getElementById('role').value = role;
            const btnCreator = document.getElementById('btn-creator');
            const btnBrand = document.getElementById('btn-brand');
            const creatorFields = document.getElementById('creator-fields');
            const brandFields = document.getElementById('brand-fields');

            if (role === 'Creator') {
                btnCreator.className = 'role-btn active creator';
                btnBrand.className = 'role-btn inactive brand';
                creatorFields.style.display = 'block';
                brandFields.style.display = 'none';
            } else {
                btnCreator.className = 'role-btn inactive creator';
                btnBrand.className = 'role-btn active brand';
                creatorFields.style.display = 'none';
                brandFields.style.display = 'block';
            }
        }

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwL2bHucpemUiQdI9Mq9WYquG-Ctv_1wt57_UfS3TalNYHSyJQpZ_UtULY6MAxQ3rWQrQ/exec';

        document.getElementById('collab-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('form-message');
            btn.innerText = 'Submitting...';
            btn.disabled = true;
            msg.style.display = 'none';

            // Collect form data as a plain object
            const payload = {
                role:           document.getElementById('role').value,
                name:           document.getElementById('name').value,
                number:         document.getElementById('number').value,
                social:         document.getElementById('social').value,
                productDetails: document.getElementById('productDetails').value,
                otherInfo:      document.getElementById('otherInfo').value
            };

            // no-cors mode does NOT allow Content-Type: application/json
            // so we send without it — body still contains the JSON string
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            })
            .then(() => {
                msg.innerText = '✅ Details submitted successfully! We will connect with you soon.';
                msg.className = 'success-msg';
                msg.style.display = 'block';
                document.getElementById('collab-form').reset();
                selectRole('Creator');
                btn.innerText = 'Submit Details';
                btn.disabled = false;
            })
            .catch(() => {
                msg.innerText = '❌ Something went wrong. Please try again.';
                msg.className = 'error-msg';
                msg.style.display = 'block';
                btn.innerText = 'Submit Details';
                btn.disabled = false;
            });
        });
    </script>
